<!DOCTYPE html>
<html lang="en">
<head>

<title>Checkout - Kaycee Gadgets</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

</header>

<section class="checkout">

</form>

</section>

<footer>

</footer>

</body>
